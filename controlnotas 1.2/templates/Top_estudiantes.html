<!-- Top_estidiantes -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 10 Estudiantes</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #f7f7f5;
            --surface:  #ffffff;
            --border:   #e8e8e4;
            --text:     #1a1a18;
            --muted:    #9a9a94;
            --gold:     #c9a84c;
            --silver:   #8a9bb0;
            --bronze:   #a0674a;
            --nav-h:    60px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
        }

        nav {
            position: fixed; top: 0; left: 0; right: 0;
            height: var(--nav-h); background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 28px; z-index: 100;
        }

        .nav-brand { display: flex; align-items: center; gap: 10px; font-size: 0.95rem; font-weight: 600; flex: 1; }
        .nav-brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text); }

        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 7px 16px; border-radius: 8px;
            font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500;
            cursor: pointer; border: 1px solid var(--border);
            background: var(--surface); color: var(--text);
            text-decoration: none; transition: background 0.15s;
        }
        .btn:hover { background: var(--bg); }

        main {
            padding-top: calc(var(--nav-h) + 40px);
            padding-bottom: 60px; max-width: 760px;
            margin: 0 auto; padding-left: 24px; padding-right: 24px;
        }

        h1 { font-size: 1.6rem; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 6px; }
        .subtitle { color: var(--muted); font-size: 0.88rem; margin-bottom: 36px; }

        /* ── PODIO ── */
        .podio { display: flex; align-items: flex-end; justify-content: center; gap: 12px; margin-bottom: 40px; }

        .podio-item {
            display: flex; flex-direction: column; align-items: center;
            flex: 1; max-width: 200px; animation: fadeUp 0.5s ease both;
        }
        .podio-item:nth-child(1) { animation-delay: 0.1s; }
        .podio-item:nth-child(2) { animation-delay: 0s; }
        .podio-item:nth-child(3) { animation-delay: 0.2s; }

        .podio-avatar {
            width: 56px; height: 56px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; margin-bottom: 8px; border: 3px solid transparent;
        }
        .podio-item.gold   .podio-avatar { background: #fef9ec; border-color: var(--gold); }
        .podio-item.silver .podio-avatar { background: #f0f4f8; border-color: var(--silver); }
        .podio-item.bronze .podio-avatar { background: #faf0ec; border-color: var(--bronze); }

        .podio-nombre { font-weight: 600; font-size: 0.85rem; text-align: center; margin-bottom: 2px; max-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .podio-carrera { font-size: 0.75rem; color: var(--muted); text-align: center; margin-bottom: 8px; max-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .podio-score { font-family: 'DM Mono', monospace; font-size: 1.1rem; font-weight: 700; }

        .podio-item.gold   .podio-score { color: var(--gold); }
        .podio-item.silver .podio-score { color: var(--silver); }
        .podio-item.bronze .podio-score { color: var(--bronze); }

        .podio-block { width: 100%; border-radius: 8px 8px 0 0; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; color: white; margin-top: 10px; }
        .podio-item.gold   .podio-block { background: var(--gold);   height: 80px; }
        .podio-item.silver .podio-block { background: var(--silver); height: 60px; }
        .podio-item.bronze .podio-block { background: var(--bronze); height: 44px; }

        /* ── LISTA ── */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .card-title { font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); padding: 20px 24px 12px; }
        .rank-list { list-style: none; }
        .rank-item { display: flex; align-items: center; gap: 16px; padding: 14px 24px; border-top: 1px solid var(--border); animation: fadeUp 0.4s ease both; transition: background 0.1s; }
        .rank-item:hover { background: var(--bg); }
        .rank-num { font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--muted); width: 24px; text-align: right; flex-shrink: 0; }
        .rank-info { flex: 1; min-width: 0; }
        .rank-nombre { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rank-carrera { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
        .rank-score { font-family: 'DM Mono', monospace; font-size: 1rem; font-weight: 700; color: var(--text); flex-shrink: 0; }
        .rank-bar-wrap { width: 100px; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; flex-shrink: 0; }
        .rank-bar { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #2ecc71, #27ae60); transition: width 0.8s ease; }
        .notas-detalle { display: flex; gap: 8px; margin-top: 4px; }
        .nota-chip { font-size: 0.72rem; font-family: 'DM Mono', monospace; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; color: var(--muted); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .empty { text-align: center; color: var(--muted); padding: 40px; font-size: 0.88rem; }

        /* ── EASTER EGG ── */
        .easter-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 999;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .easter-overlay.visible {
            opacity: 1; pointer-events: all;
        }

        .easter-img {
            max-width: 80vw; max-height: 80vh;
            border-radius: 16px;
            box-shadow: 0 0 80px rgba(255,255,255,0.15);
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .easter-overlay.visible .easter-img {
            transform: scale(1);
        }

        .easter-hint {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            font-size: 0.72rem; color: transparent;
            font-family: 'DM Mono', monospace;
            pointer-events: none; user-select: none;
            z-index: 1;
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-brand">
        <span class="nav-brand-dot"></span>
        Top 10 Estudiantes
    </div>
    <a class="btn" href="/dashprincipal">← Volver al dashboard</a>
</nav>

<main>
    <h1>🏆 Top 10 Estudiantes</h1>
    <p class="subtitle">Ranking general por promedio de notas, independiente de la carrera.</p>
    <div id="contenido"><p class="empty">Cargando...</p></div>
</main>

<!-- EASTER EGG OVERLAY -->
<div class="easter-overlay" id="easterOverlay" onclick="cerrarEaster()">
    <img class="easter-img" id="easterImg" src="" alt="">
</div>

<!-- hint invisible -->
<div class="easter-hint">mejor</div>

<script>
// ── EASTER EGG ─────────────────────────────────────────────────────
const IMAGEN_URL = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSuVfeccoxePDbzhaakPor59iy3YDRVuou95w&s";  // ← PON AQUÍ EL LINK DE TU IMAGEN
const PALABRA    = "mejor";
let   buffer     = "";

document.addEventListener('keydown', (e) => {
    buffer += e.key.toLowerCase();
    if (buffer.length > PALABRA.length) {
        buffer = buffer.slice(-PALABRA.length);
    }
    if (buffer === PALABRA) {
        activarEaster();
        buffer = "";
    }
});

function activarEaster() {
    const overlay = document.getElementById('easterOverlay');
    const img     = document.getElementById('easterImg');
    img.src = IMAGEN_URL;
    overlay.classList.add('visible');

    // Se cierra solo después de 4 segundos
    setTimeout(cerrarEaster, 4000);
}

function cerrarEaster() {
    document.getElementById('easterOverlay').classList.remove('visible');
}

// ── TOP ESTUDIANTES ────────────────────────────────────────────────
async function cargarTop() {
    const res  = await fetch('/api/estudiantes/top');
    const data = await res.json();

    if (!data.ok || data.estudiantes.length === 0) {
        document.getElementById('contenido').innerHTML = '<p class="empty">No hay estudiantes registrados.</p>';
        return;
    }

    const est = data.estudiantes;
    let html  = '';

    if (est.length >= 1) {
        const clases  = ['silver', 'gold', 'bronze'];
        const emojis  = ['🥈', '🥇', '🥉'];
        const numeros = ['2°', '1°', '3°'];

        const orden = est.length >= 3 ? [est[1], est[0], est[2]]
                    : est.length === 2 ? [est[1], est[0]]
                    : [est[0]];

        html += '<div class="podio">';
        orden.forEach((e, i) => {
            html += `
                <div class="podio-item ${clases[i]}">
                    <div class="podio-avatar">${emojis[i]}</div>
                    <div class="podio-nombre">${e.nombre}</div>
                    <div class="podio-carrera">${e.carrera}</div>
                    <div class="podio-score">${e.promedio}</div>
                    <div class="podio-block">${numeros[i]}</div>
                </div>
            `;
        });
        html += '</div>';
    }

    const resto = est.slice(3);
    if (resto.length > 0) {
        html += `
            <div class="card">
                <div class="card-title">Posiciones 4 – ${Math.min(10, est.length)}</div>
                <ul class="rank-list">
        `;
        resto.forEach((e, i) => {
            const pct   = ((e.promedio / 5) * 100).toFixed(1);
            const delay = (i * 0.06).toFixed(2);
            html += `
                <li class="rank-item" style="animation-delay:${delay}s">
                    <span class="rank-num">${i + 4}</span>
                    <div class="rank-info">
                        <div class="rank-nombre">${e.nombre}</div>
                        <div class="rank-carrera">${e.carrera}</div>
                        <div class="notas-detalle">
                            <span class="nota-chip">N1: ${e.nota1}</span>
                            <span class="nota-chip">N2: ${e.nota2}</span>
                            <span class="nota-chip">N3: ${e.nota3}</span>
                        </div>
                    </div>
                    <div class="rank-bar-wrap">
                        <div class="rank-bar" style="width:${pct}%"></div>
                    </div>
                    <div class="rank-score">${e.promedio}</div>
                </li>
            `;
        });
        html += '</ul></div>';
    }

    document.getElementById('contenido').innerHTML = html;
}

cargarTop();
</script>
</body>
</html>

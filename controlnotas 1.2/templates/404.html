<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — Página no encontrada</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@1&family=DM+Mono:wght@300;500&display=swap" rel="stylesheet"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height: 100dvh; background: #f7f5f0;
  font-family: 'DM Mono', monospace;
  display: grid; place-items: center; text-align: center;
}
.wrap { padding: 2rem; }
.num {
  font-family: 'DM Serif Display', serif; font-style: italic;
  font-size: 7rem; color: #e0dbd2; line-height: 1;
  margin-bottom: 1rem;
}
h1 { font-size: 1.1rem; color: #1a1a18; margin-bottom: .5rem; font-weight: 600; }
p  { font-size: .8rem; color: #9a9a94; margin-bottom: 2rem; }
a  {
  display: inline-block; padding: .8rem 2rem;
  background: #1a1a2e; color: #fff; text-decoration: none;
  font-size: .75rem; letter-spacing: .12em; text-transform: uppercase;
  transition: background .2s;
}
a:hover { background: #2d2d50; }
</style>
</head>
<body>
<div class="wrap">
  <div class="num">404</div>
  <h1>Página no encontrada</h1>
  <p>La ruta que buscas no existe o fue movida.</p>
  <a href="/dashprincipal">← Volver al dashboard</a>
</div>
</body>
</html>
